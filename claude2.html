<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Attractor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #controls {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
        }
        button {
            margin: 2px;
            padding: 5px 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div>Attractor: <button onclick="switchAttractor()">Clifford</button></div>
        <div>Points: <span id="pointCount">500000</span></div>
        <div>Progress: <span id="progress">0%</span></div>
    </div>

    <script>
        // Attractor functions
        function clifford(x, y, a, b, c, d) {
            return [
                Math.sin(a * y) + c * Math.cos(a * x),
                Math.sin(b * x) + d * Math.cos(b * y)
            ];
        }

        function dejong(x, y, a, b, c, d) {
            return [
                Math.sin(a * y) - c * Math.cos(b * x),
                Math.sin(c * x) - d * Math.cos(d * y)
            ];
        }

        class WebGLAttractor {
            constructor(canvas) {
                this.canvas = canvas;
                this.gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
                if (!this.gl) {
                    throw new Error('WebGL not supported');
                }

                // Parameters
                this.attractor = clifford;
                this.attractorName = 'Clifford';
                this.a = -1.4;
                this.b = 1.6;
                this.c = 1.0;
                this.d = 0.7;
                this.points = 500000;
                this.scale = 150;
                this.hue = 320;
                this.saturation = 100;
                this.brightness = 100;

                this.initWebGL();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            initWebGL() {
                const gl = this.gl;

                // Simple vertex shader for points
                const vertexShaderSource = `
                    attribute vec2 a_position;
                    uniform vec2 u_resolution;
                    uniform float u_scale;
                    uniform vec2 u_center;
                    
                    void main() {
                        vec2 position = a_position * u_scale + u_center;
                        vec2 clipSpace = ((position / u_resolution) * 2.0 - 1.0) * vec2(1, -1);
                        gl_Position = vec4(clipSpace, 0, 1);
                        gl_PointSize = 1.0;
                    }
                `;

                // Fragment shader for points
                const fragmentShaderSource = `
                    precision mediump float;
                    uniform vec3 u_color;
                    
                    void main() {
                        gl_FragColor = vec4(u_color, 0.02);
                    }
                `;

                this.program = this.createProgram(vertexShaderSource, fragmentShaderSource);

                // Get locations
                this.attribLocations = {
                    position: gl.getAttribLocation(this.program, 'a_position'),
                };
                this.uniformLocations = {
                    resolution: gl.getUniformLocation(this.program, 'u_resolution'),
                    scale: gl.getUniformLocation(this.program, 'u_scale'),
                    center: gl.getUniformLocation(this.program, 'u_center'),
                    color: gl.getUniformLocation(this.program, 'u_color'),
                };

                // Enable blending
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
            }

            createProgram(vertexSource, fragmentSource) {
                const gl = this.gl;
                const vertexShader = this.createShader(gl.VERTEX_SHADER, vertexSource);
                const fragmentShader = this.createShader(gl.FRAGMENT_SHADER, fragmentSource);
                
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                
                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error('Program link error:', gl.getProgramInfoLog(program));
                    throw new Error('Program link error');
                }
                
                return program;
            }

            createShader(type, source) {
                const gl = this.gl;
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                    throw new Error('Shader compile error');
                }
                
                return shader;
            }

            resize() {
                const gl = this.gl;
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                gl.viewport(0, 0, this.canvas.width, this.canvas.height);
            }

            hsv2rgb(h, s, v) {
                h = h % 360;
                s = Math.max(0, Math.min(100, s)) / 100;
                v = Math.max(0, Math.min(100, v)) / 100;

                if (s === 0) {
                    return [v, v, v];
                }

                h /= 60;
                const i = Math.floor(h);
                const f = h - i;
                const p = v * (1 - s);
                const q = v * (1 - s * f);
                const t = v * (1 - s * (1 - f));

                let r, g, b;
                switch (i) {
                    case 0: r = v; g = t; b = p; break;
                    case 1: r = q; g = v; b = p; break;
                    case 2: r = p; g = v; b = t; break;
                    case 3: r = p; g = q; b = v; break;
                    case 4: r = t; g = p; b = v; break;
                    default: r = v; g = p; b = q;
                }

                return [r, g, b];
            }

            async render() {
                const gl = this.gl;
                
                // Clear screen
                gl.clearColor(0, 0, 0, 1);
                gl.clear(gl.COLOR_BUFFER_BIT);

                gl.useProgram(this.program);
                
                // Set uniforms
                gl.uniform2f(this.uniformLocations.resolution, this.canvas.width, this.canvas.height);
                gl.uniform1f(this.uniformLocations.scale, this.scale);
                gl.uniform2f(this.uniformLocations.center, this.canvas.width / 2, this.canvas.height / 2);

                // Get color
                const [r, g, b] = this.hsv2rgb(this.hue, this.saturation, this.brightness);
                gl.uniform3f(this.uniformLocations.color, r, g, b);

                // Generate and render points in batches
                let x = 0, y = 0;
                const batchSize = 5000;
                const batches = Math.ceil(this.points / batchSize);

                for (let batch = 0; batch < batches; batch++) {
                    const currentBatchSize = Math.min(batchSize, this.points - batch * batchSize);
                    const points = new Float32Array(currentBatchSize * 2);

                    // Generate batch of points
                    for (let i = 0; i < currentBatchSize; i++) {
                        const [nx, ny] = this.attractor(x, y, this.a, this.b, this.c, this.d);
                        
                        // Apply smoothing (much smaller than original to see if points are being generated)
                        x = nx + (Math.random() - 0.5) * 0.01;
                        y = ny + (Math.random() - 0.5) * 0.01;

                        points[i * 2] = x;
                        points[i * 2 + 1] = y;
                    }

                    // Create buffer and render
                    const pointBuffer = gl.createBuffer();
                    gl.bindBuffer(gl.ARRAY_BUFFER, pointBuffer);
                    gl.bufferData(gl.ARRAY_BUFFER, points, gl.STATIC_DRAW);
                    
                    gl.enableVertexAttribArray(this.attribLocations.position);
                    gl.vertexAttribPointer(this.attribLocations.position, 2, gl.FLOAT, false, 0, 0);
                    
                    gl.drawArrays(gl.POINTS, 0, currentBatchSize);
                    
                    // Clean up
                    gl.deleteBuffer(pointBuffer);

                    // Update progress
                    const progress = Math.round(((batch + 1) / batches) * 100);
                    document.getElementById('progress').textContent = progress + '%';
                    
                    // Allow UI updates every 10 batches
                    if (batch % 10 === 0) {
                        await new Promise(resolve => setTimeout(resolve, 1));
                    }
                }

                console.log('Rendering complete');
            }

            switchAttractor() {
                if (this.attractorName === 'Clifford') {
                    this.attractor = dejong;
                    this.attractorName = 'de Jong';
                    this.a = -2.0;
                    this.b = -2.0;
                    this.c = -1.2;
                    this.d = 2.0;
                    this.hue = 200;
                } else {
                    this.attractor = clifford;
                    this.attractorName = 'Clifford';
                    this.a = -1.4;
                    this.b = 1.6;
                    this.c = 1.0;
                    this.d = 0.7;
                    this.hue = 320;
                }
                
                document.querySelector('#controls button').textContent = this.attractorName;
                this.render();
            }
        }

        // Initialize
        let attractor;
        
        window.addEventListener('load', () => {
            const canvas = document.getElementById('canvas');
            try {
                attractor = new WebGLAttractor(canvas);
                console.log('WebGL initialized successfully');
                attractor.render();
            } catch (error) {
                console.error('WebGL initialization failed:', error);
                // Fallback message
                document.body.innerHTML = '<div style="color: white; text-align: center; margin-top: 200px;">WebGL not supported or failed to initialize</div>';
            }
        });

        // Global function for button
        function switchAttractor() {
            if (attractor) {
                attractor.switchAttractor();
            }
        }
    </script>
</body>
</html>
